name = "telestack-realtime-db"
main = "src/index.ts"
compatibility_date = "2024-02-10"
compatibility_flags = ["nodejs_compat"]

[observability.logs]
enabled = false
invocation_logs = true

[triggers]
crons = ["*/30 * * * *"]

[placement]
mode = "smart" # Valid modes: "off" or "smart" 
# region is deprecated in newer wrangler versions, fallback to smart


# NOTE: For sub-10ms in India, ensure "Read Replication" is enabled in the Cloudflare Dashboard
# for the 'telestack_india' database.

[[d1_databases]]
binding = "DB"
database_name = "telestack_india_v2"
database_id = "042203f9-5f94-4462-bd1b-4393a327c2b4"

[vars]
CENTRIFUGO_API_KEY = "api_7d2f9a1e4b83c5d6e0f1a2b3c4d5e6f7"
CENTRIFUGO_API_URL = "https://telestack-centrifugo.onrender.com/api"
