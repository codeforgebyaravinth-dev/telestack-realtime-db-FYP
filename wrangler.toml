name = "telestack-realtime-db"
main = "src/index.ts"
compatibility_date = "2024-02-10"
compatibility_flags = ["nodejs_compat"]

##################################################
# Logging / Observability
##################################################

[observability.logs]
enabled = false
invocation_logs = true

##################################################
# Scheduled Workers
##################################################

[triggers]
crons = ["*/30 * * * *"]

##################################################
# Worker Placement
##################################################

[placement]
mode = "smart"

##################################################
# D1 Database
##################################################

# NOTE:
# Enable "Read Replication" in Cloudflare dashboard
# for sub-10ms latency in India.

[[d1_databases]]
binding = "DB"
database_name = "telestack_india_v2"
database_id = "D1_DATABASE_ID_PLACEHOLDER"

##################################################
# Environment Variables (SAFE PLACEHOLDERS)
##################################################

[vars]

# Centrifugo Realtime Engine
CENTRIFUGO_API_KEY = "CENTRIFUGO_API_KEY_PLACEHOLDER"
CENTRIFUGO_API_URL = "https://centrifugo.example.com/api"

# Auth Secret
TOKEN_SECRET = "TOKEN_SECRET_PLACEHOLDER"

# Upstash Redis
UPSTASH_REDIS_REST_URL = "https://redis.example.com"
UPSTASH_REDIS_REST_TOKEN = "UPSTASH_REDIS_TOKEN_PLACEHOLDER"

# Cloudflare Account
CLOUDFLARE_ACCOUNT_ID = "CLOUDFLARE_ACCOUNT_ID_PLACEHOLDER"

##################################################
# KV Cache
##################################################

[[kv_namespaces]]
binding = "PROJECT_CACHE"
id = "KV_NAMESPACE_ID_PLACEHOLDER"

##################################################
# Production Environment
##################################################

[env.production]

[[env.production.d1_databases]]
binding = "DB"
database_name = "telestack_india_v2"
database_id = "D1_DATABASE_ID_PLACEHOLDER"

##################################################
# Production Variables
##################################################

[env.production.vars]

CENTRIFUGO_API_KEY = "CENTRIFUGO_API_KEY_PLACEHOLDER"
CENTRIFUGO_API_URL = "https://centrifugo.example.com/api"

TOKEN_SECRET = "TOKEN_SECRET_PLACEHOLDER"

UPSTASH_REDIS_REST_URL = "https://redis.example.com"
UPSTASH_REDIS_REST_TOKEN = "UPSTASH_REDIS_TOKEN_PLACEHOLDER"

CLOUDFLARE_ACCOUNT_ID = "CLOUDFLARE_ACCOUNT_ID_PLACEHOLDER"

##################################################
# Production KV
##################################################

[[env.production.kv_namespaces]]
binding = "PROJECT_CACHE"
id = "KV_NAMESPACE_ID_PLACEHOLDER"

##################################################
# Production Logging
##################################################

[env.production.observability.logs]
enabled = false
invocation_logs = true
